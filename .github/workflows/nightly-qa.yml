name: Nightly QA Deployment

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"   # 1:00 AM Pacific Standard Time = 09:00 UTC

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  SOURCE_REPO_URL: ${{ secrets.SOURCE_REPO_URL }}
  QA_APP_DIR: ${{ secrets.QA_APP_DIR }}

jobs:
  nightly-qa:
    runs-on: ubuntu-latest

    steps:
      - name: Check out infra repo
        uses: actions/checkout@v4

      - name: Clone source repo
        run: git clone "${SOURCE_REPO_URL}" app

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Rebuild SSH key from secret
        run: |
          echo "${{ secrets.TEMP_KEY_PEM_B64 }}" | base64 -d > temp-key.pem
          chmod 600 temp-key.pem

      - name: Launch temporary verification EC2
        id: launch
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --image-id "${{ secrets.TEMP_AMI_ID }}" \
            --instance-type t2.micro \
            --key-name "${{ secrets.TEMP_KEY_NAME }}" \
            --security-group-ids "${{ secrets.TEMP_SG_ID }}" \
            --subnet-id "${{ secrets.TEMP_SUBNET_ID }}" \
            --user-data file://scripts/install-docker.sh \
            --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=nightly-verify-ec2}]' \
            --query 'Instances[0].InstanceId' \
            --output text)

          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Wait for EC2 to be ready
        run: |
          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
          aws ec2 wait instance-status-ok --instance-ids "$INSTANCE_ID"

          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)

          echo "TEMP_PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV

      - name: Wait for SSH to respond
        run: |
          for i in {1..30}; do
            if ssh -o StrictHostKeyChecking=no -i temp-key.pem ec2-user@"$TEMP_PUBLIC_IP" "echo SSH ready"; then
              exit 0
            fi
            sleep 10
          done
          echo "SSH never became ready"
          exit 1

      - name: Copy verify files to temporary EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i temp-key.pem ec2-user@"$TEMP_PUBLIC_IP" "mkdir -p ~/nightly/compose ~/nightly/scripts"
          scp -o StrictHostKeyChecking=no -i temp-key.pem compose/docker-compose.verify.yml ec2-user@"$TEMP_PUBLIC_IP":~/nightly/compose/
          scp -o StrictHostKeyChecking=no -i temp-key.pem scripts/smoke-test.sh ec2-user@"$TEMP_PUBLIC_IP":~/nightly/scripts/

      - name: Run verification on temporary EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i temp-key.pem ec2-user@"$TEMP_PUBLIC_IP" <<EOF
            set -e
            cd ~/nightly
            if [ ! -d app ]; then
              git clone "${SOURCE_REPO_URL}" app
            fi

            cat > .env <<EOT
            RDS_HOST=${{ secrets.RDS_HOST }}
            RDS_PORT=${{ secrets.RDS_PORT }}
            RDS_USER=${{ secrets.RDS_USER }}
            RDS_PASSWORD=${{ secrets.RDS_PASSWORD }}
            RDS_DB=${{ secrets.RDS_DB }}
            EOT

            cd compose
            docker compose --env-file ../.env -f docker-compose.verify.yml up -d --build

            sleep 20
            chmod +x ../scripts/smoke-test.sh
            ../scripts/smoke-test.sh
          EOF

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          BACKEND_IMAGE="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/spa-backend:${GITHUB_SHA}"
          docker build -t "$BACKEND_IMAGE" ./app/backend
          docker push "$BACKEND_IMAGE"

      - name: Build and push frontend image
        run: |
          FRONTEND_IMAGE="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/spa-frontend:${GITHUB_SHA}"
          docker build -t "$FRONTEND_IMAGE" ./app/frontend
          docker push "$FRONTEND_IMAGE"

      - name: Copy QA compose file to QA EC2
        run: |
          scp -o StrictHostKeyChecking=no -i temp-key.pem compose/docker-compose.qa.yml "${{ secrets.QA_USER }}"@"${{ secrets.QA_HOST }}":"${QA_APP_DIR}/"

      - name: Deploy to QA EC2
        run: |
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          ECR_PASSWORD=$(aws ecr get-login-password --region "${AWS_REGION}")

          ssh -o StrictHostKeyChecking=no -i temp-key.pem "${{ secrets.QA_USER }}"@"${{ secrets.QA_HOST }}" <<EOF
            set -e
            mkdir -p "${QA_APP_DIR}"

            echo "${ECR_PASSWORD}" | docker login --username AWS --password-stdin "${ECR_REGISTRY}"

            cat > "${QA_APP_DIR}/.env" <<EOT
            AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID}
            AWS_REGION=${AWS_REGION}
            IMAGE_TAG=${GITHUB_SHA}
            RDS_HOST=${{ secrets.RDS_HOST }}
            RDS_PORT=${{ secrets.RDS_PORT }}
            RDS_USER=${{ secrets.RDS_USER }}
            RDS_PASSWORD=${{ secrets.RDS_PASSWORD }}
            RDS_DB=${{ secrets.RDS_DB }}
            EOT

            cd "${QA_APP_DIR}"
            docker compose --env-file .env -f docker-compose.qa.yml pull
            docker compose --env-file .env -f docker-compose.qa.yml up -d
          EOF

      - name: Terminate temporary EC2
        if: always()
        run: |
          if [ -n "${INSTANCE_ID:-}" ]; then
            aws ec2 terminate-instances --instance-ids "$INSTANCE_ID"
          fi