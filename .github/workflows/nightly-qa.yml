name: Nightly QA Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: '17 11 * * *'

jobs:
  test-runner:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Show runner info
        run: |
          uname -a
          whoami

      - name: Test AWS identity
        run: |
          aws sts get-caller-identity

      - name: Test Docker
        run: |
          docker --version