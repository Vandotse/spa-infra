name: Nightly QA Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: '17 11 * * *'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: 169078094851
      BACKEND_ECR_REPO: spa-backend
      FRONTEND_ECR_REPO: spa-frontend
      QA_INSTANCE_ID: ${{ vars.QA_INSTANCE_ID }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Checkout source repo
        uses: actions/checkout@v5
        with:
          repository: Vandotse/docker-mysql-nodejs-reactjs-app
          path: source
          # Remove the next line if the source repo is public
          token: ${{ secrets.SOURCE_REPO_PAT }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
          docker login --username AWS --password-stdin \
          "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"

      - name: Build backend image
        run: |
          docker build \
            -t "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_ECR_REPO:$IMAGE_TAG" \
            ./source/backend

      - name: Build frontend image
        run: |
          docker build \
            -t "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_ECR_REPO:$IMAGE_TAG" \
            ./source/frontend

      - name: Push backend image
        run: |
          docker push "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_ECR_REPO:$IMAGE_TAG"

      - name: Push frontend image
        run: |
          docker push "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_ECR_REPO:$IMAGE_TAG"

      - name: Send deploy command to QA EC2
        id: deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$QA_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy latest backend and frontend containers" \
            --parameters commands="[
              \"aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com\",
              \"docker pull $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_ECR_REPO:$IMAGE_TAG\",
              \"docker pull $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_ECR_REPO:$IMAGE_TAG\",
              \"docker rm -f api || true\",
              \"docker rm -f frontend || true\",
              \"docker run -d --name api --restart unless-stopped --env-file /opt/spa/backend.env -p 3000:3000 $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_ECR_REPO:$IMAGE_TAG\",
              \"docker run -d --name frontend --restart unless-stopped -p 3001:3000 $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_ECR_REPO:$IMAGE_TAG\",
              \"sudo systemctl reload nginx || true\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          echo "COMMAND_ID=$COMMAND_ID" >> "$GITHUB_ENV"
          echo "Started SSM command: $COMMAND_ID"

      - name: Wait for deploy command result
        run: |
          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$QA_INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || true)

            echo "Current status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deployment succeeded"
              exit 0
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$QA_INSTANCE_ID"
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for deployment"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$QA_INSTANCE_ID" || true
          exit 1