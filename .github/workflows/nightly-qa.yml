name: Nightly QA Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: '17 11 * * *'   # 11:17 UTC every day

permissions:
  contents: read

jobs:
  nightly-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      BACKEND_ECR_REPO: ${{ vars.BACKEND_ECR_REPO }}
      FRONTEND_ECR_REPO: ${{ vars.FRONTEND_ECR_REPO }}
      QA_INSTANCE_ID: ${{ vars.QA_INSTANCE_ID }}
      VERIFIER_LAUNCH_TEMPLATE_ID: ${{ vars.VERIFIER_LAUNCH_TEMPLATE_ID }}
      SOURCE_REPO: ${{ vars.SOURCE_REPO }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Checkout source repo
        uses: actions/checkout@v5
        with:
          repository: ${{ vars.SOURCE_REPO }}
          path: source

      - name: Launch verifier EC2
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
            --launch-template LaunchTemplateId=${VERIFIER_LAUNCH_TEMPLATE_ID} \
            --query 'Instances[0].InstanceId' \
            --output text)

          echo "INSTANCE_ID=$INSTANCE_ID" >> "$GITHUB_ENV"
          echo "Launched verifier: $INSTANCE_ID"

      - name: Wait for verifier to be running
        run: |
          aws ec2 wait instance-running --instance-ids "$INSTANCE_ID"
          echo "Verifier instance is running."

      - name: Wait for verifier to appear in SSM
        run: |
          for i in {1..30}; do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || true)

            echo "Current SSM status: $STATUS"

            if [ "$STATUS" = "Online" ]; then
              echo "Verifier is online in SSM."
              exit 0
            fi

            sleep 10
          done

          echo "Verifier never appeared in SSM."
          exit 1

      - name: Run smoke test on verifier
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Smoke test for verifier" \
            --parameters commands='[
              "bash -lc '\''docker --version'\''",
              "bash -lc '\''echo Smoke test passed'\''"
            ]' \
            --query 'Command.CommandId' \
            --output text)

          echo "COMMAND_ID=$COMMAND_ID" >> "$GITHUB_ENV"
          echo "Verifier command ID: $COMMAND_ID"

      - name: Wait for smoke test result
        run: |
          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || true)

            echo "Smoke test status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID"
              exit 0
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID"
              exit 1
            fi

            sleep 10
          done

          echo "Smoke test did not complete in time."
          exit 1

      - name: Build backend image
        run: |
          docker build \
            -t ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${BACKEND_ECR_REPO}:${IMAGE_TAG} \
            ./source/backend

      - name: Build frontend image
        run: |
          docker build \
            -t ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${FRONTEND_ECR_REPO}:${IMAGE_TAG} \
            ./source/frontend

      - name: Push backend image
        run: |
          docker push ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${BACKEND_ECR_REPO}:${IMAGE_TAG}

      - name: Push frontend image
        run: |
          docker push ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${FRONTEND_ECR_REPO}:${IMAGE_TAG}

      - name: Deploy to QA EC2 through SSM
        run: |
          DEPLOY_COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$QA_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy new QA images" \
            --parameters commands="[
              \"aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com\",
              \"docker pull ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${BACKEND_ECR_REPO}:${IMAGE_TAG}\",
              \"docker pull ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${FRONTEND_ECR_REPO}:${IMAGE_TAG}\",
              \"docker rm -f api || true\",
              \"docker rm -f frontend || true\",
              \"docker run -d --name api --restart unless-stopped --env-file /opt/spa/backend.env -p 3000:3000 ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${BACKEND_ECR_REPO}:${IMAGE_TAG}\",
              \"docker run -d --name frontend --restart unless-stopped -p 3001:3000 ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${FRONTEND_ECR_REPO}:${IMAGE_TAG}\",
              \"sudo systemctl reload nginx || true\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          echo "DEPLOY_COMMAND_ID=$DEPLOY_COMMAND_ID" >> "$GITHUB_ENV"
          echo "QA deploy command ID: $DEPLOY_COMMAND_ID"

      - name: Wait for QA deploy result
        run: |
          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$DEPLOY_COMMAND_ID" \
              --instance-id "$QA_INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || true)

            echo "QA deploy status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "$DEPLOY_COMMAND_ID" \
                --instance-id "$QA_INSTANCE_ID"
              exit 0
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id "$DEPLOY_COMMAND_ID" \
                --instance-id "$QA_INSTANCE_ID"
              exit 1
            fi

            sleep 10
          done

          echo "QA deploy did not complete in time."
          exit 1

      - name: Terminate verifier EC2
        if: always()
        run: |
          if [ -n "${INSTANCE_ID:-}" ]; then
            aws ec2 terminate-instances --instance-ids "$INSTANCE_ID"
            echo "Terminated verifier: $INSTANCE_ID"
          fi