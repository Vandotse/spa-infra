name: Nightly QA Deployment

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  SOURCE_REPO_URL: ${{ secrets.SOURCE_REPO_URL }}
  ECR_BACKEND_REPO: ${{ secrets.ECR_BACKEND_REPO }}
  ECR_FRONTEND_REPO: ${{ secrets.ECR_FRONTEND_REPO }}
  QA_EC2_IP: ${{ secrets.QA_EC2_IP }}
  QA_EC2_USER: ${{ secrets.QA_EC2_USER }}
  CONTROL_EC2_IP: ${{ secrets.CONTROL_EC2_IP }}
  CONTROL_EC2_USER: ${{ secrets.CONTROL_EC2_USER }}
  RDS_HOST: ${{ secrets.RDS_HOST }}
  RDS_PORT: ${{ secrets.RDS_PORT }}
  RDS_USER: ${{ secrets.RDS_USER }}
  RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}
  RDS_DB_NAME: ${{ secrets.RDS_DB_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Clone source repo
        run: git clone "${SOURCE_REPO_URL}" app

      - name: Configure AWS credentials for ECR actions
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.EC2_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat > ~/.ssh/config <<'EOF'
          Host *
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          EOF

      - name: Build Docker images
        run: bash scripts/build-image.sh

      - name: Launch temporary EC2 via LabRole control EC2
        env:
          AMI_ID: ${{ secrets.AMI_ID }}
          EC2_SECURITY_GROUP: ${{ secrets.SECURITY_GROUP_ID }}
          EC2_SUBNET: ${{ secrets.SUBNET_ID }}
          EC2_KEY_NAME: ${{ secrets.EC2_KEY_NAME }}
        run: bash scripts/create-ec2.sh

      - name: Wait for temporary EC2 SSH
        run: |
          echo "Waiting for verifier SSH on $EC2_IP ..."
          for i in {1..60}; do
            if ssh -o BatchMode=yes -o ConnectTimeout=5 ec2-user@"$EC2_IP" "echo connected" >/dev/null 2>&1; then
              echo "SSH ready"
              exit 0
            fi
            echo "Attempt $i/60: SSH not ready yet"
            sleep 5
          done
          echo "Verifier EC2 never became reachable by SSH"
          exit 1

      - name: Wait for Docker on verifier EC2
        run: |
          ssh ec2-user@"$EC2_IP" '
            for i in {1..60}; do
              if command -v docker >/dev/null 2>&1 && sudo docker info >/dev/null 2>&1; then
                echo "Docker is ready"
                exit 0
              fi
              echo "Waiting for Docker..."
              sleep 5
            done
            echo "Docker never became ready"
            exit 1
          '

      - name: Run test containers on verifier EC2
        run: bash scripts/run-test-containers.sh

      - name: Smoke test verifier EC2
        env:
          EC2_IP: ${{ env.EC2_IP }}
        run: bash scripts/smoke-test.sh

      - name: Push images to ECR
        run: bash scripts/push-ecr.sh

      - name: Deploy to QA EC2
        run: bash scripts/deploy-qa.sh

      - name: Terminate temporary EC2 via LabRole control EC2
        if: always()
        run: bash scripts/destroy-ec2.sh